<h2>SmartPlanet - Nueva Nota</h2>

<form id="notaForm">
  <input id="nombre_cliente" placeholder="Nombre completo" required /><br />
  <input id="telefono" placeholder="Teléfono" required /><br />
  <input id="domicilio" placeholder="Domicilio" required /><br /><br />

  <input id="equipo" placeholder="Equipo (ej: iPhone 11)" required /><br />
  <input id="imei" placeholder="IMEI (opcional)" /><br />
  <input id="pin" placeholder="PIN (si tiene)" /><br /><br />

  <input id="falla" placeholder="Falla" required /><br />
  <textarea id="notas" placeholder="Notas adicionales" required></textarea
  ><br /><br />

  <input id="precio" placeholder="Precio o POR DEFINIR" required /><br />
  <input id="anticipo" placeholder="Anticipo (0 si no)" required /><br /><br />

  <button type="submit">Guardar Nota</button>
</form>

<hr />

<button onclick="verNotas()">Ver Notas</button>

<ul id="lista"></ul>

<script>
  document.getElementById("notaForm").addEventListener("submit", function (e) {
    e.preventDefault();

    const data = {
      nombre_cliente: document.getElementById("nombre_cliente").value,
      telefono: document.getElementById("telefono").value,
      domicilio: document.getElementById("domicilio").value,
      equipo: document.getElementById("equipo").value,
      imei: document.getElementById("imei").value,
      pin: document.getElementById("pin").value,
      falla: document.getElementById("falla").value,
      notas: document.getElementById("notas").value,
      precio: document.getElementById("precio").value,
      anticipo: document.getElementById("anticipo").value,
    };

    // Validaciones extra por si
    for (let key in data) {
      if (
        (data[key] === "" || data[key] === null) &&
        key !== "imei" &&
        key !== "pin"
      ) {
        return alert("Por favor completa todos los campos obligatorios");
      }
    }

    fetch("/guardar", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data),
    })
      .then((res) => res.text())
      .then((msg) => {
        alert(msg);
        document.getElementById("notaForm").reset(); // limpia formulario
      });
  });

  function verNotas() {
    fetch("/notas")
      .then((res) => res.json())
      .then((data) => {
        const lista = document.getElementById("lista");
        lista.innerHTML = "";
        data.forEach((nota) => {
          const li = document.createElement("li");
          li.textContent = `${nota.folio} - ${nota.nombre_cliente} - ${nota.equipo} - ${nota.estado}`;
          lista.appendChild(li);
        });
      });
  }
</script>
